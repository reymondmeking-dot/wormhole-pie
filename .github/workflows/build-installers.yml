name: Build Wormhole Pie Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    name: Windows NSIS and MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile
      - run: cargo fmt --all -- --check
        working-directory: src-tauri
      - run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri
      - run: cargo test --all-targets --all-features
        working-directory: src-tauri
      - run: pnpm tauri build --bundles nsis,msi --ci

      - uses: actions/upload-artifact@v7
        with:
          name: wormhole-pie-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  macos:
    name: macOS Universal DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile
      - run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri

      - name: Build universal DMG
        run: |
          if [ -n "$WORMHOLE_APPLE_CERTIFICATE" ]; then
            export APPLE_CERTIFICATE="$WORMHOLE_APPLE_CERTIFICATE"
            export APPLE_CERTIFICATE_PASSWORD="$WORMHOLE_APPLE_CERTIFICATE_PASSWORD"
            export APPLE_SIGNING_IDENTITY="$WORMHOLE_APPLE_SIGNING_IDENTITY"
            export APPLE_ID="$WORMHOLE_APPLE_ID"
            export APPLE_PASSWORD="$WORMHOLE_APPLE_PASSWORD"
            export APPLE_TEAM_ID="$WORMHOLE_APPLE_TEAM_ID"
          fi
          pnpm tauri build --target universal-apple-darwin --bundles dmg --ci
        env:
          WORMHOLE_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          WORMHOLE_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          WORMHOLE_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          WORMHOLE_APPLE_ID: ${{ secrets.APPLE_ID }}
          WORMHOLE_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          WORMHOLE_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - uses: actions/upload-artifact@v7
        with:
          name: wormhole-pie-macos-universal
          if-no-files-found: error
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wormhole-pie-windows
          path: release-assets/windows
      - uses: actions/download-artifact@v8
        with:
          name: wormhole-pie-macos-universal
          path: release-assets/macos
      - name: Publish installers
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Wormhole Pie ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/windows/**/*.exe
            release-assets/windows/**/*.msi
            release-assets/macos/**/*.dmg
